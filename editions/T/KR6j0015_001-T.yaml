body:
  text: 開府儀同三司特進試鴻臚卿肅國公食邑三千戶賜紫贈司空諡大鑒正號大廣智大興善寺三藏沙門不空奉詔譯稽首無礙智密教意生子依彼蘇多羅攝此隨行法真言行菩薩先住平等誓語密身密俱後作相應行三昧耶真言曰曩莫三曼多勃馱難唵阿三謎底哩二合三謎三三摩曳娑嚩二合引訶引契謂齊輪合並建於二空五處頂肩心最後加咽位次以不動聖辟障及除垢而能淨眾事結護隨相應不動尊真言曰曩莫三曼多嚩日囉二合𧹞引一戰拏摩賀引嚧曬拏二娑頗二合吒野三吽怛羅二合吒半音呼四憾引𤚥五定空加地水風火竪於心慧劍亦如是出鞘能成辦次說如來鉤用請於本尊一切眾聖主依本誓而來如來鉤真言曰曩莫三曼多勃馱南阿引薩嚩怛囉二合阿引鉢囉二合底賀多怛他薩儻引矩奢四冒地拶哩耶二合波唎布囉上聲迦半音娑嚩二合引訶引止觀內相叉堅合智風竪纔屈於初分餘輪狀若環聖天悲願力隨請咸來降奉現三昧耶明契如前說既呈本誓已發喜而無謬次當隨力分供養表誠心閼伽香食燈下至一花水或但心運想殊勝最難量當以普通印密語共加之有表無表俱一時皆成就普通真言曰曩莫三曼多勃馱南一薩嚩他欠平聲嗢娜孽二合諦薩頗二合囉係呬𤚥伽伽那劍平聲呼娑嚩二合引訶禪智互相叉齊輪頂上合運心普周遍所念皆現前既施供養已修常作持誦先擐金剛鎧結護事相應金剛甲冑真言曩莫三曼多嚩囉二合𧹞嚩日囉二合迦嚩者吽先作虛心合風輪糺持火大空依火本遍觸後居心次結方隅界如前不動尊左轉成辟除右旋及上下備觸身支分結護悉堅牢真言及本契如前已分別既為嚴備訖當示根本契還加五位處七轉或再三散印頂上開半跏正身意或作相應坐隨方如教說正面住身前覩一圓明像清淨無瑕玷猶如滿月輪中有本尊形如色超三界妙縠嚴身服寶冠紺髮垂寂然三摩地輝焰過眾電猶如淨鏡內幽邃現真容喜怒顯顏色操持與願等正受相應身明了心無亂無相淨法體應願濟群生專注而念持限數既終畢懈極後方已復結普通印虔誠啟願等慇重禮聖尊左轉無動力解前所結護還呈本尊契頂上散開之心送於聖天五輪投地禮然起隨眾善後會復如初一時與二三或四皆如此餘分旋繞塔浴像讚方廣塗飾曼荼羅布花讚佛德或復無雜念專注於等引以此淨三業悉地速現前聖力所加持行願相應故諸有樂修習隨師而受學持明傳本教無越三昧耶勤策無間斷離蓋及熏醉順行於學處悉地隨力成我依大日教略示瑜伽行修證殊勝福普潤諸有情
